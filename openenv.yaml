name: inventops
version: 1.0.0
domain: logistics
description: >
  Multi-echelon inventory optimization environment. Agents manage
  reorder policy, warehouse routing, and demand forecasting under
  stochastic lead times and supplier disruptions.
tasks:
  - id: easy
    name: single-sku-reorder
    difficulty: 1
    episode_length: 30
  - id: medium
    name: multi-sku-budget
    difficulty: 2
    episode_length: 60
  - id: hard
    name: multi-warehouse-network
    difficulty: 3
    episode_length: 90
observation_type: structured_dict
action_type: discrete_parameterized
reward_type: dense_shaped
python: ">=3.11"
entry_point: InventOps:SupplyChainEnv
